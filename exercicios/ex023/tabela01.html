<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            border-collapse: collapse;
            border: 4px solid black;
        }

        td {
            border: 2px solid rgba(0, 0, 0, 0.664);
            padding: 8px;
        }

        td.dado {
            background-color: lightgreen;
        }

        tr.linha {
            background-color: lightgray;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>

    <!--
    HIERARQUIA DE TABELAS SIMPLES
        TABLE = tabela
            TABLE ROW = primeira linha
                TABLE HEADER = cabeçalho de tabela
                TABLE DATA = dado de tabela
    -->

    <table>
        <tr> <!--PRIMEIRA LINHA-->
            <td>A1</td>
            <td class="dado">B1</td>
            <td>C1</td>
        </tr>

        <tr class="linha"> <!--SEGUNDA LINHA-->
            <td>A2</td>
            <td>B2</td>
            <td class="dado">C2</td>
        </tr>

        <tr> <!--TERCEIRA LINHA-->
            <td class="dado">A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>

        <tr class="linha"> <!--QUARTA LINHA-->
            <td>A4</td>
            <td>B4</td>
            <td class="dado">C4</td>
        </tr>
    </table>
</body>
</html>
